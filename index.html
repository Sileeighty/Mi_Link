<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Neko1ay - Links</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    
    <meta name="theme-color" content="#87CEEB">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-color: #87CEEB;
            --secondary-color: #4169E1;
            --text-color: white;
            --card-bg: rgba(255, 255, 255, 0.15);
            --card-border: rgba(255, 255, 255, 0.2);
        }

        html {
            font-size: clamp(14px, 2.5vw, 18px);
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Clouds Animation */
        .clouds-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            animation: float-cloud linear infinite;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
        }

        .cloud1 { width: 200px; height: 60px; top: 20%; left: -200px; animation-duration: 25s; }
        .cloud1::before { width: 100px; height: 100px; top: -50px; left: 20px; }
        
        .cloud2 { width: 150px; height: 50px; top: 40%; left: -150px; animation-duration: 30s; animation-delay: 5s; }
        .cloud2::before { width: 80px; height: 80px; top: -40px; right: 20px; }
        
        .cloud3 { width: 180px; height: 55px; top: 60%; left: -180px; animation-duration: 28s; animation-delay: 10s; }
        .cloud3::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        
        .cloud4 { width: 220px; height: 65px; top: 15%; left: -220px; animation-duration: 35s; animation-delay: 15s; }
        .cloud4::before { width: 110px; height: 110px; top: -55px; right: 30px; }

        @keyframes float-cloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 300px)); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(15px, 3vw, 40px);
            width: 100%;
            max-width: 100%;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            width: 100%;
            max-width: min(90vw, 600px);
            animation: fadeInDown 0.8s ease-out;
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: clamp(15px, 3vh, 25px);
            animation: float-avatar 3s ease-in-out infinite;
        }

        .avatar {
            width: clamp(80px, 20vw, 150px);
            height: clamp(80px, 20vw, 150px);
            border-radius: 50%;
            object-fit: cover;
            border: clamp(3px, 0.8vw, 5px) solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 clamp(5px, 1vw, 20px) clamp(10px, 2vw, 40px) rgba(0, 0, 0, 0.3);
            pointer-events: none;
            user-select: none;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        @keyframes float-avatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome-text {
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: var(--text-color);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            word-break: break-word;
            line-height: 1.2;
            font-weight: 700;
        }

        .subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: clamp(20px, 4vh, 40px);
            line-height: 1.5;
            padding: 0 clamp(10px, 2vw, 20px);
        }

        /* Links Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 2vh, 15px);
            width: 100%;
            max-width: min(90vw, 500px);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--card-border);
            border-radius: clamp(10px, 3vw, 20px);
            padding: clamp(12px, 3vh, 20px) clamp(15px, 4vw, 30px);
            text-decoration: none;
            color: var(--text-color);
            font-size: clamp(0.95rem, 2.5vw, 1.2rem);
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 clamp(3px, 0.5vw, 10px) clamp(10px, 1.5vw, 20px) rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            min-height: clamp(45px, 8vh, 65px);
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 clamp(5px, 1vw, 15px) clamp(15px, 2.5vw, 30px) rgba(0, 0, 0, 0.2);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        /* Footer */
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(0.8rem, 2vw, 1rem);
            padding: clamp(15px, 3vh, 25px);
            margin-top: auto;
            width: 100%;
            z-index: 10;
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            bottom: clamp(15px, 3vh, 30px);
            right: clamp(15px, 3vh, 30px);
            width: clamp(45px, 8vh, 65px);
            height: clamp(45px, 8vh, 65px);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 clamp(3px, 0.5vw, 10px) clamp(8px, 1.5vw, 20px) rgba(0, 0, 0, 0.2);
            z-index: 100;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .settings-btn svg {
            width: clamp(18px, 4vh, 28px);
            height: clamp(18px, 4vh, 28px);
            fill: white;
        }

        .settings-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: rgba(255, 255, 255, 0.35);
        }

        .settings-btn:active {
            transform: rotate(90deg) scale(1);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: min(100%, 450px);
            height: 100vh;
            height: 100dvh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: right 0.4s ease;
            padding: clamp(20px, 4vh, 40px);
            overflow-y: auto;
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(20px, 4vh, 30px);
            padding-bottom: clamp(10px, 2vh, 20px);
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }

        .settings-title {
            font-size: clamp(1.3rem, 3vw, 2rem);
            color: #333;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: clamp(1.5rem, 4vh, 2.5rem);
            cursor: pointer;
            color: #666;
            width: clamp(35px, 6vh, 45px);
            height: clamp(35px, 6vh, 45px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
        }

        .setting-item {
            margin-bottom: clamp(15px, 3vh, 25px);
        }

        .setting-label {
            display: block;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .theme-options {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
        }

        .theme-btn {
            flex: 1;
            padding: clamp(10px, 2.5vh, 15px);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            transition: all 0.3s ease;
        }

        .theme-btn.active {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .file-input-wrapper {
            position: relative;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: clamp(12px, 2.5vh, 15px);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.4);
        }

        .preview-section {
            margin-top: clamp(10px, 2vh, 20px);
            padding: clamp(10px, 2vh, 15px);
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        #bgPreview {
            width: 100%;
            height: clamp(100px, 20vh, 150px);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border-radius: 10px;
            margin-top: 10px;
        }

        .reset-btn {
            width: 100%;
            padding: clamp(12px, 2.5vh, 15px);
            margin-top: clamp(10px, 2vh, 20px);
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* Copy Notification */
        .copy-notification {
            position: fixed;
            top: clamp(15px, 3vh, 30px);
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: clamp(10px, 2.5vh, 15px) clamp(20px, 4vw, 30px);
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            z-index: 2000;
            transition: transform 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90vw;
            text-align: center;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Dark Theme */
        body.dark-theme {
            background: linear-gradient(135deg, #0a0a0a 0%, #4a1a6b 100%);
        }

        body.dark-theme .link-card {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-theme .theme-btn.active {
            border-color: #9b59b6;
            background: linear-gradient(135deg, #0a0a0a 0%, #4a1a6b 100%);
        }

        /* Particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 10s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* ===== MEDIA QUERIES ===== */

        /* Mobile Phones (up to 480px) */
        @media (max-width: 480px) {
            .links-container {
                gap: 10px;
            }

            .link-card {
                min-height: 50px;
                padding: 14px 18px;
            }
        }

        /* Tablets (481px to 1024px) */
        @media (min-width: 481px) and (max-width: 1024px) {
            .links-container {
                max-width: 450px;
            }

            .container {
                padding: 25px;
            }
        }

        /* Desktop (1025px to 1920px) */
        @media (min-width: 1025px) {
            .links-container {
                max-width: 500px;
            }

            .container {
                padding: 30px;
            }
        }

        /* Large Screens / TVs (1921px+) */
        @media (min-width: 1921px) {
            html {
                font-size: 20px;
            }

            .container {
                padding: 50px;
                max-width: 1400px;
                margin: 0 auto;
            }

            .links-container {
                max-width: 700px;
                gap: 25px;
            }

            .link-card {
                padding: 25px 40px;
                font-size: 1.4rem;
                min-height: 80px;
                border-radius: 25px;
            }

            .avatar {
                width: 200px;
                height: 200px;
            }

            .welcome-text {
                font-size: 3.5rem;
            }

            .subtitle {
                font-size: 1.5rem;
            }

            .settings-btn {
                width: 75px;
                height: 75px;
                bottom: 40px;
                right: 40px;
            }

            .settings-panel {
                max-width: 600px;
                padding: 50px;
            }

            .footer {
                font-size: 1.2rem;
                padding: 30px;
            }
        }

        /* Landscape orientation on mobile/tablet */
        @media (max-height: 600px) and (orientation: landscape) {
            .container {
                flex-direction: row;
                gap: 40px;
                justify-content: center;
            }

            .profile-section {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 25px;
                text-align: left;
                max-width: 100%;
            }

            .avatar-wrapper {
                margin-bottom: 0;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .welcome-text {
                font-size: 1.8rem;
                margin-bottom: 5px;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 0;
            }

            .links-container {
                max-width: 400px;
            }

            .footer {
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                padding: 10px;
                font-size: 0.9rem;
            }

            .settings-btn {
                bottom: 15px;
                right: 15px;
            }
        }

        /* Touch devices */
        @media (hover: none) {
            .link-card:hover {
                transform: none;
            }
            
            .link-card:active {
                transform: scale(0.97);
            }

            .settings-btn:hover {
                transform: rotate(90deg);
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* High contrast mode */
        @media (prefers-contrast: high) {
            .link-card {
                border: 3px solid white;
            }

            .avatar {
                border-width: 5px;
            }
        }
    </style>
</head>

        <button class="reset-btn" onclick="resetSettings()" role="button">🔄 Сбросить настройки</button>
    </div>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const particleCount = isMobile ? 8 : 15;

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();

        function copyEmail() {
            const email = 'nasxnik@gmail.com';
            navigator.clipboard.writeText(email).then(() => {
                showCopyNotification();
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopyNotification();
            });
        }

        function showCopyNotification() {
            const notification = document.getElementById('copyNotification');
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2500);
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
            document.body.style.overflow = panel.classList.contains('active') ? 'hidden' : '';
        }

        document.addEventListener('click', (e) => {
            const panel = document.getElementById('settingsPanel');
            const btn = document.querySelector('.settings-btn');
            if (panel.classList.contains('active') && !panel.contains(e.target) && !btn.contains(e.target)) {
                toggleSettings();
            }
        });

        function setTheme(theme) {
            const body = document.body;
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (theme === 'dark') {
                body.classList.add('dark-theme');
                buttons[0].classList.add('active');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                buttons[1].classList.add('active');
                localStorage.setItem('theme', 'light');
            }
        }

        function changeBackground(event) {
            const file = event.target.files[0];
            if (file && file.size <= 5 * 1024 * 1024) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.body.style.backgroundImage = `url(${e.target.result})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    localStorage.setItem('background', e.target.result);
                    document.getElementById('bgPreview').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('bgPreview').style.backgroundSize = 'cover';
                };
                reader.readAsDataURL(file);
            }
        }

        function resetSettings() {
            if (confirm('Сбросить все настройки?')) {
                document.body.style.backgroundImage = '';
                document.body.classList.remove('dark-theme');
                localStorage.removeItem('background');
                localStorage.removeItem('theme');
                document.getElementById('bgPreview').style.backgroundImage = '';
                document.querySelectorAll('.theme-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === 0);
                });
            }
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            const savedBg = localStorage.getItem('background');
            if (savedTheme) setTheme(savedTheme);
            if (savedBg) {
                document.body.style.backgroundImage = `url(${savedBg})`;
                document.getElementById('bgPreview').style.backgroundImage = `url(${savedBg})`;
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const panel = document.getElementById('settingsPanel');
                if (panel.classList.contains('active')) toggleSettings();
            }
        });
    </script>
</body>
</html>
