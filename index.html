<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#87CEEB">
    <meta name="format-detection" content="telephone=no">
    <title>Neko1ay - Links</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <!-- Облака -->
    <div class="clouds-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
    </div>

    <!-- Звёзды (для тёмной темы) -->
    <div class="stars-container">
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>
        <div class="star star11"></div>
        <div class="star star12"></div>
    </div>

    <!-- Уведомление -->
    <div class="copy-notification" id="copyNotification">
        <span class="icon">✅</span>
        <span class="text">Email скопирован!</span>
    </div>

    <!-- Контейнер -->
    <div class="container">
        <!-- Профиль -->
        <div class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://avatars.githubusercontent.com/u/240462453?s=400&u=933cff916d1c158a0197884b3cb0a59ad77e40d7&v=4" alt="Neko1ay" class="avatar" draggable="false">
                <div class="avatar-overlay"></div>
            </div>
            <h1 class="welcome-text">Neko1ay</h1>
            <p class="subtitle">Добро пожаловать, здесь все мои основные соцсети</p>
        </div>

        <!-- Ссылки -->
        <div class="links-container">
            <a href="https://www.instagram.com/neko1ay" class="link-card" target="_blank" rel="noopener noreferrer">
                <span class="icon">📷</span>
                <span class="text">ЗапретГрам</span>
            </a>
            <a href="https://t.me/nekoo1ay" class="link-card" target="_blank" rel="noopener noreferrer">
                <span class="icon">✈️</span>
                <span class="text">Telegram</span>
            </a>
            <a href="https://youtube.com/@Neko1ay" class="link-card" target="_blank" rel="noopener noreferrer">
                <span class="icon">🎬</span>
                <span class="text">YouTube</span>
            </a>
            <a href="https://www.twitch.tv/neko1ay" class="link-card" target="_blank" rel="noopener noreferrer">
                <span class="icon">🎮</span>
                <span class="text">Twitch</span>
            </a>
            <a href="https://github.com/Sileeighty" class="link-card" target="_blank" rel="noopener noreferrer">
                <span class="icon">💻</span>
                <span class="text">GitHub</span>
            </a>
            <div class="link-card" onclick="copyEmail()" role="button" tabindex="0">
                <span class="icon">📧</span>
                <span class="text">Mail: nasxnik@gmail.com</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">Neko1ay • 2026</div>
    </div>

    <!-- Кнопка настроек -->
    <div class="settings-btn" onclick="toggleSettings()" role="button" aria-label="Настройки" tabindex="0">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.34-.07.67-.07 1 0 .33.03.66.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63Z"/>
        </svg>
    </div>

    <!-- Панель настроек -->
    <div class="settings-panel" id="settingsPanel" role="dialog" aria-modal="true">
        <div class="settings-header">
            <h2 class="settings-title">Настройки</h2>
            <button class="close-btn" onclick="toggleSettings()" aria-label="Закрыть">×</button>
        </div>
        <div class="setting-item">
            <label class="setting-label">Тема</label>
            <div class="theme-options">
                <button class="theme-btn active" onclick="setTheme('dark')" id="darkThemeBtn" role="button">🌙 Тёмная</button>
                <button class="theme-btn" onclick="setTheme('light')" id="lightThemeBtn" role="button">☀️ Светлая</button>
            </div>
        </div>
        <div class="setting-item">
            <label class="setting-label">Фоновое изображение</label>
            <div class="file-input-wrapper">
                <input type="file" id="bgInput" accept="image/*" onchange="changeBackground(event)">
                <label for="bgInput" class="file-input-label">📁 Выбрать изображение</label>
            </div>
            <div id="bgPreview"></div>
        </div>
        <button class="reset-btn" onclick="resetSettings()" role="button">🔄 Сбросить</button>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
