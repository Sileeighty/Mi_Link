<head>

    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
    
    <!-- Apple Touch Icon для iOS (iPhone/iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png">
    
    <!-- Android Chrome -->

    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    
    <!-- Manifest для PWA (Progressive Web App) -->

    <!-- Meta теги для темы -->
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neko1ay">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #87CEEB 0%, #4169E1 100%);
            position: relative;
            touch-action: manipulation;
        }

        /* Cloud Container */
        .clouds-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            opacity: 0.6;
            animation: float-cloud linear infinite;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 100px;
        }

        .cloud1 {
            width: 200px;
            height: 60px;
            top: 20%;
            left: -200px;
            animation-duration: 25s;
            animation-delay: 0s;
        }

        .cloud1::before {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 20px;
        }

        .cloud2 {
            width: 150px;
            height: 50px;
            top: 40%;
            left: -150px;
            animation-duration: 30s;
            animation-delay: 5s;
        }

        .cloud2::before {
            width: 80px;
            height: 80px;
            top: -40px;
            right: 20px;
        }

        .cloud3 {
            width: 180px;
            height: 55px;
            top: 60%;
            left: -180px;
            animation-duration: 28s;
            animation-delay: 10s;
        }

        .cloud3::before {
            width: 90px;
            height: 90px;
            top: -45px;
            left: 30px;
        }

        .cloud4 {
            width: 220px;
            height: 65px;
            top: 15%;
            left: -220px;
            animation-duration: 35s;
            animation-delay: 15s;
        }

        .cloud4::before {
            width: 110px;
            height: 110px;
            top: -55px;
            right: 30px;
        }

        @keyframes float-cloud {
            0% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(25vw) translateY(20px);
            }
            50% {
                transform: translateX(50vw) translateY(0);
            }
            75% {
                transform: translateX(75vw) translateY(-20px);
            }
            100% {
                transform: translateX(100vw) translateY(0);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 1000px;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        /* Protected Avatar Container */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            animation: avatarFloat 3s ease-in-out infinite, fadeIn 1s ease-out;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        /* Transparent overlay */
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 10;
            cursor: default;
        }

        @keyframes avatarFloat {
            0%, 100% {
                transform: translateY(0) rotateY(0deg);
            }
            50% {
                transform: translateY(-10px) rotateY(5deg);
            }
        }

        .welcome-text {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out 0.3s both;
            word-break: break-word;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.6s both;
            padding: 0 10px;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px 30px;
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .link-card:active {
            transform: translateY(0) scale(0.98);
        }

        /* Touch feedback for mobile */
        @media (hover: none) {
            .link-card:hover {
                transform: none;
            }
            
            .link-card:active {
                transform: scale(0.98);
            }
        }

        /* Mail Copy Notification */
        .copy-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90vw;
            text-align: center;
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .copy-notification .icon {
            font-size: 1.3rem;
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            animation: fadeIn 1s ease-out 1.2s both;
            -webkit-tap-highlight-color: transparent;
        }

        .settings-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .settings-btn:hover svg {
            fill: white;
        }

        .settings-btn:active {
            transform: rotate(90deg) scale(1);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 30px;
            overflow-y: auto;
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }

        .settings-title {
            font-size: 1.8rem;
            color: #333;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            transition: transform 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            transform: rotate(90deg);
            color: #333;
        }

        .setting-item {
            margin-bottom: 25px;
            animation: slideInRight 0.5s ease;
        }

        .setting-label {
            display: block;
            font-size: 1rem;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .theme-options {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .theme-btn:active {
            transform: translateY(0);
        }

        .theme-btn.active {
            border-color: #87CEEB;
            background: linear-gradient(135deg, #87CEEB 0%, #4169E1 100%);
            color: white;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 15px;
            background: linear-gradient(135deg, #87CEEB 0%, #4169E1 100%);
            color: white;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }

        .file-input-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(135, 206, 235, 0.4);
        }

        .file-input-label:active {
            transform: translateY(0);
        }

        .preview-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .footer {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            animation: fadeIn 1s ease-out 1.2s both;
            z-index: 10;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Dark Theme */
        body.dark-theme {
            background: linear-gradient(135deg, #0a0a0a 0%, #4a1a6b 100%);
        }

        body.dark-theme .link-card {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-theme .theme-btn.active {
            border-color: #9b59b6;
            background: linear-gradient(135deg, #0a0a0a 0%, #4a1a6b 100%);
            color: white;
        }

        body.dark-theme .file-input-label {
            background: linear-gradient(135deg, #0a0a0a 0%, #4a1a6b 100%);
        }

        body.dark-theme .file-input-label:hover {
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.4);
        }

        /* Particle Effect */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 10s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                justify-content: flex-start;
                padding-top: 40px;
            }

            .avatar {
                width: 120px;
                height: 120px;
                border-width: 4px;
            }

            .welcome-text {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 30px;
            }

            .links-container {
                gap: 12px;
            }

            .link-card {
                padding: 18px 25px;
                font-size: 1rem;
                min-height: 55px;
            }

            .settings-panel {
                max-width: 100%;
                padding: 20px;
            }

            .settings-title {
                font-size: 1.5rem;
            }

            .footer {
                bottom: 20px;
                left: 20px;
                font-size: 0.8rem;
            }

            .settings-btn {
                bottom: 20px;
                right: 20px;
                width: 55px;
                height: 55px;
            }

            .settings-btn svg {
                width: 24px;
                height: 24px;
            }

            .copy-notification {
                padding: 12px 20px;
                font-size: 0.95rem;
            }

            /* Reduce cloud size on mobile */
            .cloud1, .cloud2, .cloud3, .cloud4 {
                opacity: 0.4;
            }
        }

        @media (max-width: 480px) {
            .avatar {
                width: 100px;
                height: 100px;
            }

            .welcome-text {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 0.95rem;
                padding: 0 5px;
            }

            .link-card {
                padding: 16px 20px;
                font-size: 0.95rem;
            }

            .theme-btn {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        /* Landscape orientation */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                flex-direction: row;
                gap: 30px;
            }

            .profile-section {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 20px;
                text-align: left;
            }

            .avatar-wrapper {
                margin-bottom: 0;
            }

            .avatar {
                width: 80px;
                height: 80px;
            }

            .welcome-text {
                font-size: 1.5rem;
                margin-bottom: 5px;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 0;
            }

            .links-container {
                max-width: 300px;
            }
        }

        /* Disable 3D effects on mobile for better performance */
        @media (pointer: coarse) {
            .link-card {
                transform: none;
            }
            
            .avatar-wrapper {
                transform: none;
            }
        }
    </style>
</head>

            <label class="setting-label">Фоновое изображение</label>
            <div class="file-input-wrapper">
                <input type="file" id="bgInput" accept="image/*" onchange="changeBackground(event)">
                <label for="bgInput" class="file-input-label">📁 Выбрать изображение с устройства</label>
            </div>
        </div>

        <div class="setting-item">
            <div class="preview-section">
                <label class="setting-label">Предпросмотр:</label>
                <div id="bgPreview" style="width: 100%; height: 150px; background: linear-gradient(135deg, #87CEEB 0%, #4169E1 100%); border-radius: 10px; margin-top: 10px;"></div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetSettings()" role="button">🔄 Сбросить настройки</button>
    </div>

    <script>
        // Check if device is mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // Create particles (reduce on mobile)
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = isMobile ? 10 : 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();

        // Copy Email Function
        function copyEmail() {
            const email = 'nasxnik@gmail.com';
            navigator.clipboard.writeText(email).then(() => {
                showCopyNotification();
            }).catch(err => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopyNotification();
            });
        }

        // Show Copy Notification
        function showCopyNotification() {
            const notification = document.getElementById('copyNotification');
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2500);
        }

        // Settings Panel
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('active');
            
            // Prevent body scroll when panel is open
            if (panel.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        // Close panel when clicking outside
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('settingsPanel');
            const settingsBtn = document.querySelector('.settings-btn');
            
            if (panel.classList.contains('active') && 
                !panel.contains(e.target) && 
                !settingsBtn.contains(e.target)) {
                toggleSettings();
            }
        });

        // Theme Switcher
        function setTheme(theme) {
            const body = document.body;
            const buttons = document.querySelectorAll('.theme-btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (theme === 'dark') {
                body.classList.add('dark-theme');
                buttons[0].classList.add('active');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                buttons[1].classList.add('active');
                localStorage.setItem('theme', 'light');
            }
        }

        // Background Changer
        function changeBackground(event) {
            const file = event.target.files[0];
            if (file) {
                // Check file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой. Максимальный размер: 5MB');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.body.style.transition = 'none';
                    document.body.style.backgroundImage = `url(${e.target.result})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    localStorage.setItem('background', e.target.result);
                    
                    // Update preview
                    document.getElementById('bgPreview').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('bgPreview').style.backgroundSize = 'cover';
                    document.getElementById('bgPreview').style.backgroundPosition = 'center';
                    
                    setTimeout(() => {
                        document.body.style.transition = 'background 0.5s ease';
                    }, 100);
                };
                reader.readAsDataURL(file);
            }
        }

        // Reset Settings
        function resetSettings() {
            if (confirm('Вы уверены, что хотите сбросить все настройки?')) {
                document.body.style.transition = 'none';
                document.body.style.backgroundImage = '';
                document.body.classList.remove('dark-theme');
                localStorage.removeItem('background');
                localStorage.removeItem('theme');
                
                // Reset preview
                document.getElementById('bgPreview').style.backgroundImage = '';
                document.getElementById('bgPreview').style.background = 'linear-gradient(135deg, #87CEEB 0%, #4169E1 100%)';
                
                // Reset theme buttons
                document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.theme-btn:first-child').classList.add('active');
                
                setTimeout(() => {
                    document.body.style.transition = 'background 0.5s ease';
                }, 100);
            }
        }

        // Load saved settings
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            const savedBg = localStorage.getItem('background');
            
            document.body.style.transition = 'none';
            
            if (savedTheme) {
                setTheme(savedTheme);
            }
            
            if (savedBg) {
                document.body.style.backgroundImage = `url(${savedBg})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
                
                document.getElementById('bgPreview').style.backgroundImage = `url(${savedBg})`;
                document.getElementById('bgPreview').style.backgroundSize = 'cover';
                document.getElementById('bgPreview').style.backgroundPosition = 'center';
            }
            
            setTimeout(() => {
                document.body.style.transition = 'background 0.5s ease';
            }, 100);
        };

        // Touch feedback for cards (mobile)
        if (isMobile) {
            const cards = document.querySelectorAll('.link-card');
            cards.forEach(card => {
                card.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.98)';
                });
                
                card.addEventListener('touchend', function() {
                    this.style.transform = '';
                });
            });
        }

        // Prevent zoom on double tap for iOS
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const panel = document.getElementById('settingsPanel');
                if (panel.classList.contains('active')) {
                    toggleSettings();
                }
            }
        });
    </script>
</body>
</html>
